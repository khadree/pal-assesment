# nginx/nginx.conf  –  lightweight reverse proxy in front of the Node app
#
# Key features:
#   • Rate limiting (10 req/s per IP, burst of 20)
#   • Gzip compression
#   • Security headers
#   • Request ID tracing
#   • Upstream keepalive

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time reqid=$request_id';
  access_log /var/log/nginx/access.log main;

  # ── Performance ───────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 10m;

  # ── Compression ───────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_types application/json text/plain;
  gzip_min_length 1000;

  # ── Rate limiting ─────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
  limit_req_status 429;

  # ── Upstream ──────────────────────────────────────────────────
  upstream node_app {
    server app:3000;
    keepalive 32;
  }

  # ── Server block ──────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Generate unique request ID for tracing
    add_header X-Request-ID $request_id always;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "DENY"            always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "no-referrer"     always;
    add_header Content-Security-Policy "default-src 'none'" always;

    # Hide nginx version
    server_tokens off;

    # Health endpoint — no rate limit, no auth (used by load-balancer probes)
    location = /health {
      proxy_pass         http://node_app;
      proxy_set_header   Host $host;
      access_log         off;
    }

    # API endpoints
    location / {
      limit_req zone=api burst=20 nodelay;

      proxy_pass              http://node_app;
      proxy_http_version      1.1;
      proxy_set_header        Upgrade          $http_upgrade;
      proxy_set_header        Connection       "keep-alive";
      proxy_set_header        Host             $host;
      proxy_set_header        X-Real-IP        $remote_addr;
      proxy_set_header        X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header        X-Request-ID     $request_id;
      proxy_cache_bypass      $http_upgrade;

      proxy_connect_timeout   5s;
      proxy_send_timeout      30s;
      proxy_read_timeout      30s;
    }
  }
}
